category: IT Services
commonfields:
  id: CriblAPI
  version: -1
configuration:
- defaultvalue: https://your-cribl-instance.com/api/v1
  display: Server URL
  name: url
  required: true
  type: 0
  additionalinfo: >-
    Base URL for the Cribl API, e.g. https://main-<org>.cribl.cloud/api/v1.
    Worker Group and Worker Node routing is handled automatically by each command.
- display: Client ID
  displaypassword: Client Secret
  name: credentials
  required: true
  type: 9
  additionalinfo: >-
    OAuth2 client credentials for Cribl.Cloud. Create a client under
    Settings > Global Settings > API Authentication in your Cribl.Cloud organization.
- defaultvalue: https://login.cribl.cloud/oauth/token
  display: Token URL
  name: token_url
  required: false
  type: 0
  additionalinfo: >-
    OAuth2 token endpoint. Defaults to the Cribl.Cloud endpoint. Override only
    for on-premises deployments with a custom identity provider.
- display: Trust any certificate (not secure)
  name: insecure
  required: false
  type: 8
  defaultvalue: 'false'
- display: Use system proxy settings
  name: proxy
  required: false
  type: 8
  defaultvalue: 'false'
description: Manage and monitor Cribl Stream and Edge deployments — pipelines, sources, destinations, worker groups, jobs, lookups, and system metrics.
display: Cribl API
name: CriblAPI
script:
  commands:
  - name: criblapi-get-system-info
    description: Get basic system information for the current Cribl instance.
    arguments:
    - name: fields
      description: Comma-separated list of SystemInfoField values to include in the response.
      required: false
    - name: messages
      description: If true, include system messages in the response.
      required: false
      predefined:
      - 'true'
      - 'false'
    - name: conf
      description: If true, include a configuration summary in the response.
      required: false
      predefined:
      - 'true'
      - 'false'
    outputs:
    - contextPath: CriblAPI.SystemInfo.guid
      description: Unique identifier of the Cribl instance.
      type: String
    - contextPath: CriblAPI.SystemInfo.version
      description: Cribl product version.
      type: String
    - contextPath: CriblAPI.SystemInfo.hostname
      description: Hostname of the Cribl instance.
      type: String
    - contextPath: CriblAPI.SystemInfo.cpuCores
      description: Number of CPU cores available.
      type: Number
    - contextPath: CriblAPI.SystemInfo.memoryMB
      description: Total memory in megabytes.
      type: Number
    - contextPath: CriblAPI.SystemInfo.os
      description: Operating system information.
      type: String
    - contextPath: CriblAPI.SystemInfo.nodeVersion
      description: Node.js runtime version.
      type: String
    - contextPath: CriblAPI.SystemInfo.product
      description: Cribl product name (e.g., stream, edge).
      type: String

  - name: criblapi-get-health
    description: Get the current health status of the Cribl server (Leader or Worker Node).
    arguments: []
    outputs:
    - contextPath: CriblAPI.Health.status
      description: Overall health status of the server.
      type: String
    - contextPath: CriblAPI.Health.uptime
      description: Server uptime in seconds.
      type: Number
    - contextPath: CriblAPI.Health.mode
      description: Server mode (e.g., primary, standby).
      type: String

  - name: criblapi-list-worker-groups
    description: List all Worker Groups, Outpost Groups, or Edge Fleets for the specified Cribl product.
    arguments:
    - name: product
      description: Name of the Cribl product to list groups for.
      required: false
      defaultValue: stream
      predefined:
      - stream
      - edge
      - outpost
    - name: fields
      description: Comma-separated list of additional fields to include (e.g., git.commit, git.localChanges, git.log).
      required: false
    outputs:
    - contextPath: CriblAPI.WorkerGroup.id
      description: Unique identifier of the Worker Group.
      type: String
    - contextPath: CriblAPI.WorkerGroup.name
      description: Display name of the Worker Group.
      type: String
    - contextPath: CriblAPI.WorkerGroup.description
      description: Description of the Worker Group.
      type: String
    - contextPath: CriblAPI.WorkerGroup.workerCount
      description: Number of workers connected to the group.
      type: Number
    - contextPath: CriblAPI.WorkerGroup.configVersion
      description: Current deployed configuration version.
      type: String
    - contextPath: CriblAPI.WorkerGroup.tags
      description: Tags associated with the Worker Group.
      type: String
    - contextPath: CriblAPI.WorkerGroup.isFleet
      description: Whether the group is an Edge Fleet.
      type: Boolean

  - name: criblapi-get-worker-group
    description: Get details for a specific Worker Group, Outpost Group, or Edge Fleet.
    arguments:
    - name: id
      description: The ID of the Worker Group to retrieve.
      required: true
    - name: product
      description: Name of the Cribl product the group belongs to.
      required: false
      defaultValue: stream
      predefined:
      - stream
      - edge
      - outpost
    - name: fields
      description: Comma-separated list of additional fields to include (e.g., git.commit, git.localChanges, git.log).
      required: false
    outputs:
    - contextPath: CriblAPI.WorkerGroup.id
      description: Unique identifier of the Worker Group.
      type: String
    - contextPath: CriblAPI.WorkerGroup.name
      description: Display name of the Worker Group.
      type: String
    - contextPath: CriblAPI.WorkerGroup.description
      description: Description of the Worker Group.
      type: String
    - contextPath: CriblAPI.WorkerGroup.workerCount
      description: Number of workers connected to the group.
      type: Number
    - contextPath: CriblAPI.WorkerGroup.configVersion
      description: Current deployed configuration version.
      type: String
    - contextPath: CriblAPI.WorkerGroup.tags
      description: Tags associated with the Worker Group.
      type: String

  - name: criblapi-deploy-worker-group
    description: Deploy the latest committed configuration to a Worker Group, Outpost Group, or Edge Fleet.
    arguments:
    - name: id
      description: The ID of the Worker Group to deploy configuration to.
      required: true
    - name: product
      description: Name of the Cribl product the group belongs to.
      required: false
      defaultValue: stream
      predefined:
      - stream
      - edge
      - outpost
    outputs:
    - contextPath: CriblAPI.WorkerGroup.id
      description: Unique identifier of the Worker Group.
      type: String
    - contextPath: CriblAPI.WorkerGroup.configVersion
      description: Configuration version after deployment.
      type: String
    - contextPath: CriblAPI.WorkerGroup.deployingWorkerCount
      description: Number of workers currently receiving the new configuration.
      type: Number

  - name: criblapi-list-workers
    description: Get detailed metadata for Worker, Edge, or Outpost Nodes.
    arguments:
    - name: product
      description: Name of the Cribl product to list worker nodes for.
      required: false
      defaultValue: stream
      predefined:
      - stream
      - edge
      - outpost
    - name: limit
      description: Maximum number of nodes to return.
      required: false
    - name: offset
      description: Pagination offset — starting point for results.
      required: false
    - name: filter_exp
      description: Filter expression to evaluate against nodes for inclusion in the response.
      required: false
    outputs:
    - contextPath: CriblAPI.Worker.guid
      description: Unique identifier (GUID) of the worker node.
      type: String
    - contextPath: CriblAPI.Worker.hostname
      description: Hostname of the worker node.
      type: String
    - contextPath: CriblAPI.Worker.ip
      description: IP address of the worker node.
      type: String
    - contextPath: CriblAPI.Worker.group
      description: Worker Group the node belongs to.
      type: String
    - contextPath: CriblAPI.Worker.status
      description: Connection status of the worker node.
      type: String
    - contextPath: CriblAPI.Worker.version
      description: Cribl version running on the worker node.
      type: String
    - contextPath: CriblAPI.Worker.cpuPerc
      description: CPU usage percentage.
      type: Number
    - contextPath: CriblAPI.Worker.memUsed
      description: Memory used in bytes.
      type: Number

  - name: criblapi-restart-workers
    description: Restart all Worker, Edge, or Outpost Nodes for the specified Cribl product.
    arguments:
    - name: product
      description: Name of the Cribl product whose worker nodes should be restarted.
      required: false
      defaultValue: stream
      predefined:
      - stream
      - edge
      - outpost
    outputs:
    - contextPath: CriblAPI.RestartResponse.restarted
      description: Number of worker nodes that were restarted.
      type: Number
    - contextPath: CriblAPI.RestartResponse.status
      description: Status message from the restart operation.
      type: String

  - name: criblapi-list-pipelines
    description: List all Pipelines. Scope to a Worker Group or Worker Node with the optional arguments.
    arguments:
    - name: worker_group
      description: Worker Group ID to scope the request (e.g., "default"). Omit to query the Leader.
      required: false
    - name: worker_node
      description: Worker Node ID to scope the request. Takes precedence over worker_group if both are provided.
      required: false
    outputs:
    - contextPath: CriblAPI.Pipeline.id
      description: Unique identifier of the pipeline.
      type: String
    - contextPath: CriblAPI.Pipeline.description
      description: Description of the pipeline.
      type: String
    - contextPath: CriblAPI.Pipeline.tags
      description: Tags associated with the pipeline.
      type: String
    - contextPath: CriblAPI.Pipeline.functions
      description: List of functions in the pipeline.
      type: Unknown

  - name: criblapi-get-pipeline
    description: Get details for a specific Pipeline. Scope to a Worker Group or Worker Node with the optional arguments.
    arguments:
    - name: id
      description: The ID of the pipeline to retrieve.
      required: true
    - name: worker_group
      description: Worker Group ID to scope the request. Omit to query the Leader.
      required: false
    - name: worker_node
      description: Worker Node ID to scope the request. Takes precedence over worker_group if both are provided.
      required: false
    outputs:
    - contextPath: CriblAPI.Pipeline.id
      description: Unique identifier of the pipeline.
      type: String
    - contextPath: CriblAPI.Pipeline.description
      description: Description of the pipeline.
      type: String
    - contextPath: CriblAPI.Pipeline.tags
      description: Tags associated with the pipeline.
      type: String
    - contextPath: CriblAPI.Pipeline.functions
      description: List of functions in the pipeline.
      type: Unknown

  - name: criblapi-list-sources
    description: List all Sources (inputs). Scope to a Worker Group or Worker Node with the optional arguments.
    arguments:
    - name: type
      description: Filter results by source type (e.g., syslog, http, kafka). Only one type per request is supported.
      required: false
    - name: worker_group
      description: Worker Group ID to scope the request (e.g., "default"). Omit to query the Leader.
      required: false
    - name: worker_node
      description: Worker Node ID to scope the request. Takes precedence over worker_group if both are provided.
      required: false
    outputs:
    - contextPath: CriblAPI.Source.id
      description: Unique identifier of the source.
      type: String
    - contextPath: CriblAPI.Source.type
      description: Source type (e.g., syslog, http, kafka).
      type: String
    - contextPath: CriblAPI.Source.description
      description: Description of the source.
      type: String
    - contextPath: CriblAPI.Source.disabled
      description: Whether the source is disabled.
      type: Boolean
    - contextPath: CriblAPI.Source.pipeline
      description: Pipeline attached to this source.
      type: String
    - contextPath: CriblAPI.Source.tags
      description: Tags associated with the source.
      type: String

  - name: criblapi-get-source
    description: Get details for a specific Source. Scope to a Worker Group or Worker Node with the optional arguments.
    arguments:
    - name: id
      description: The ID of the source to retrieve.
      required: true
    - name: worker_group
      description: Worker Group ID to scope the request. Omit to query the Leader.
      required: false
    - name: worker_node
      description: Worker Node ID to scope the request. Takes precedence over worker_group if both are provided.
      required: false
    outputs:
    - contextPath: CriblAPI.Source.id
      description: Unique identifier of the source.
      type: String
    - contextPath: CriblAPI.Source.type
      description: Source type.
      type: String
    - contextPath: CriblAPI.Source.description
      description: Description of the source.
      type: String
    - contextPath: CriblAPI.Source.disabled
      description: Whether the source is disabled.
      type: Boolean
    - contextPath: CriblAPI.Source.pipeline
      description: Pipeline attached to this source.
      type: String

  - name: criblapi-list-source-status
    description: List status and optional metrics for all Sources. Scope to a Worker Group or Worker Node with the optional arguments.
    arguments:
    - name: metrics
      description: Set to true to include metrics for each source.
      required: false
      predefined:
      - 'true'
      - 'false'
    - name: limit
      description: Maximum number of items to return.
      required: false
    - name: offset
      description: Pagination offset.
      required: false
    - name: worker_group
      description: Worker Group ID to scope the request. Omit to query the Leader.
      required: false
    - name: worker_node
      description: Worker Node ID to scope the request. Takes precedence over worker_group if both are provided.
      required: false
    outputs:
    - contextPath: CriblAPI.SourceStatus.id
      description: Unique identifier of the source.
      type: String
    - contextPath: CriblAPI.SourceStatus.status
      description: Current operational status of the source.
      type: String
    - contextPath: CriblAPI.SourceStatus.in
      description: Events received per second.
      type: Number
    - contextPath: CriblAPI.SourceStatus.out
      description: Events sent per second.
      type: Number

  - name: criblapi-get-source-status
    description: Get the status and optional metrics for a specific Source. Scope to a Worker Group or Worker Node with the optional arguments.
    arguments:
    - name: id
      description: The ID of the source to get status for.
      required: true
    - name: metrics
      description: Set to true to include metrics for the source.
      required: false
      predefined:
      - 'true'
      - 'false'
    - name: worker_group
      description: Worker Group ID to scope the request. Omit to query the Leader.
      required: false
    - name: worker_node
      description: Worker Node ID to scope the request. Takes precedence over worker_group if both are provided.
      required: false
    outputs:
    - contextPath: CriblAPI.SourceStatus.id
      description: Unique identifier of the source.
      type: String
    - contextPath: CriblAPI.SourceStatus.status
      description: Current operational status of the source.
      type: String
    - contextPath: CriblAPI.SourceStatus.in
      description: Events received per second.
      type: Number
    - contextPath: CriblAPI.SourceStatus.out
      description: Events sent per second.
      type: Number

  - name: criblapi-list-destinations
    description: List all Destinations (outputs). Scope to a Worker Group or Worker Node with the optional arguments.
    arguments:
    - name: type
      description: Filter results by destination type (e.g., splunk, s3, syslog). Only one type per request is supported.
      required: false
    - name: worker_group
      description: Worker Group ID to scope the request (e.g., "default"). Omit to query the Leader.
      required: false
    - name: worker_node
      description: Worker Node ID to scope the request. Takes precedence over worker_group if both are provided.
      required: false
    outputs:
    - contextPath: CriblAPI.Destination.id
      description: Unique identifier of the destination.
      type: String
    - contextPath: CriblAPI.Destination.type
      description: Destination type (e.g., splunk, s3, kafka).
      type: String
    - contextPath: CriblAPI.Destination.description
      description: Description of the destination.
      type: String
    - contextPath: CriblAPI.Destination.disabled
      description: Whether the destination is disabled.
      type: Boolean
    - contextPath: CriblAPI.Destination.pipeline
      description: Pipeline attached to this destination.
      type: String
    - contextPath: CriblAPI.Destination.tags
      description: Tags associated with the destination.
      type: String

  - name: criblapi-get-destination
    description: Get details for a specific Destination. Scope to a Worker Group or Worker Node with the optional arguments.
    arguments:
    - name: id
      description: The ID of the destination to retrieve.
      required: true
    - name: worker_group
      description: Worker Group ID to scope the request. Omit to query the Leader.
      required: false
    - name: worker_node
      description: Worker Node ID to scope the request. Takes precedence over worker_group if both are provided.
      required: false
    outputs:
    - contextPath: CriblAPI.Destination.id
      description: Unique identifier of the destination.
      type: String
    - contextPath: CriblAPI.Destination.type
      description: Destination type.
      type: String
    - contextPath: CriblAPI.Destination.description
      description: Description of the destination.
      type: String
    - contextPath: CriblAPI.Destination.disabled
      description: Whether the destination is disabled.
      type: Boolean

  - name: criblapi-list-destination-status
    description: List status and optional metrics for all Destinations. Scope to a Worker Group or Worker Node with the optional arguments.
    arguments:
    - name: metrics
      description: Set to true to include metrics for each destination.
      required: false
      predefined:
      - 'true'
      - 'false'
    - name: limit
      description: Maximum number of items to return.
      required: false
    - name: offset
      description: Pagination offset.
      required: false
    - name: worker_group
      description: Worker Group ID to scope the request. Omit to query the Leader.
      required: false
    - name: worker_node
      description: Worker Node ID to scope the request. Takes precedence over worker_group if both are provided.
      required: false
    outputs:
    - contextPath: CriblAPI.DestinationStatus.id
      description: Unique identifier of the destination.
      type: String
    - contextPath: CriblAPI.DestinationStatus.status
      description: Current operational status of the destination.
      type: String
    - contextPath: CriblAPI.DestinationStatus.out
      description: Events sent per second.
      type: Number
    - contextPath: CriblAPI.DestinationStatus.backpressure
      description: Backpressure status of the destination.
      type: String

  - name: criblapi-get-destination-status
    description: Get the status and optional metrics for a specific Destination. Scope to a Worker Group or Worker Node with the optional arguments.
    arguments:
    - name: id
      description: The ID of the destination to get status for.
      required: true
    - name: metrics
      description: Set to true to include metrics for the destination.
      required: false
      predefined:
      - 'true'
      - 'false'
    - name: worker_group
      description: Worker Group ID to scope the request. Omit to query the Leader.
      required: false
    - name: worker_node
      description: Worker Node ID to scope the request. Takes precedence over worker_group if both are provided.
      required: false
    outputs:
    - contextPath: CriblAPI.DestinationStatus.id
      description: Unique identifier of the destination.
      type: String
    - contextPath: CriblAPI.DestinationStatus.status
      description: Current operational status of the destination.
      type: String
    - contextPath: CriblAPI.DestinationStatus.out
      description: Events sent per second.
      type: Number

  - name: criblapi-list-jobs
    description: List all jobs on the current Cribl instance, with optional filtering.
    arguments:
    - name: limit
      description: Maximum number of jobs to return.
      required: false
    - name: offset
      description: Pagination offset.
      required: false
    - name: run_type
      description: Filter by job run type (e.g., scheduled, ad-hoc).
      required: false
    - name: state
      description: Filter by current job state (e.g., running, completed, failed, cancelled).
      required: false
    - name: collector_id
      description: Filter by collector ID (e.g., Prometheus-in).
      required: false
    outputs:
    - contextPath: CriblAPI.Job.id
      description: Unique instance ID of the job.
      type: String
    - contextPath: CriblAPI.Job.type
      description: Type of job (e.g., collection, scheduled).
      type: String
    - contextPath: CriblAPI.Job.status
      description: Current status of the job.
      type: String
    - contextPath: CriblAPI.Job.startTime
      description: Timestamp when the job started.
      type: Date
    - contextPath: CriblAPI.Job.endTime
      description: Timestamp when the job ended.
      type: Date
    - contextPath: CriblAPI.Job.numEvents
      description: Total number of events processed.
      type: Number
    - contextPath: CriblAPI.Job.collectorId
      description: ID of the collector associated with the job.
      type: String

  - name: criblapi-get-job
    description: Get details for a specific job by its instance ID.
    arguments:
    - name: id
      description: The instance ID of the job to retrieve.
      required: true
    outputs:
    - contextPath: CriblAPI.Job.id
      description: Unique instance ID of the job.
      type: String
    - contextPath: CriblAPI.Job.type
      description: Type of job.
      type: String
    - contextPath: CriblAPI.Job.status
      description: Current status of the job.
      type: String
    - contextPath: CriblAPI.Job.startTime
      description: Timestamp when the job started.
      type: Date
    - contextPath: CriblAPI.Job.endTime
      description: Timestamp when the job ended.
      type: Date
    - contextPath: CriblAPI.Job.numEvents
      description: Total number of events processed.
      type: Number

  - name: criblapi-cancel-job
    description: Cancel a running job by its instance ID.
    arguments:
    - name: id
      description: The instance ID of the job to cancel.
      required: true
    outputs:
    - contextPath: CriblAPI.JobState.id
      description: Instance ID of the job.
      type: String
    - contextPath: CriblAPI.JobState.status
      description: Updated job status after the cancel request.
      type: String

  - name: criblapi-pause-job
    description: Pause a running job by its instance ID.
    arguments:
    - name: id
      description: The instance ID of the job to pause.
      required: true
    outputs:
    - contextPath: CriblAPI.JobState.id
      description: Instance ID of the job.
      type: String
    - contextPath: CriblAPI.JobState.status
      description: Updated job status after the pause request.
      type: String

  - name: criblapi-resume-job
    description: Resume a paused job by its instance ID.
    arguments:
    - name: id
      description: The instance ID of the job to resume.
      required: true
    outputs:
    - contextPath: CriblAPI.JobState.id
      description: Instance ID of the job.
      type: String
    - contextPath: CriblAPI.JobState.status
      description: Updated job status after the resume request.
      type: String

  - name: criblapi-list-lookups
    description: List all Lookup files configured on the current Cribl instance.
    arguments: []
    outputs:
    - contextPath: CriblAPI.Lookup.id
      description: Unique identifier of the lookup.
      type: String
    - contextPath: CriblAPI.Lookup.description
      description: Description of the lookup.
      type: String
    - contextPath: CriblAPI.Lookup.size
      description: File size of the lookup in bytes.
      type: Number
    - contextPath: CriblAPI.Lookup.fileName
      description: Filename of the lookup file.
      type: String
    - contextPath: CriblAPI.Lookup.tags
      description: Tags associated with the lookup.
      type: String

  - name: criblapi-get-lookup
    description: Get details for a specific Lookup file.
    arguments:
    - name: id
      description: The ID of the lookup to retrieve.
      required: true
    outputs:
    - contextPath: CriblAPI.Lookup.id
      description: Unique identifier of the lookup.
      type: String
    - contextPath: CriblAPI.Lookup.description
      description: Description of the lookup.
      type: String
    - contextPath: CriblAPI.Lookup.size
      description: File size of the lookup in bytes.
      type: Number
    - contextPath: CriblAPI.Lookup.fileName
      description: Filename of the lookup file.
      type: String

  - name: criblapi-query-metrics
    description: Query and aggregate internal system metrics from the Cribl instance.
    arguments:
    - name: filter_expr
      description: Filter expression to select which metric time series to include (e.g., "cribl.logstream.inputs.in_bytes").
      required: false
    - name: pipeline
      description: Aggregation pipeline expression to apply to the metric data.
      required: false
    - name: earliest
      description: Start of the time range for the query (e.g., "-15m", "-1h", Unix epoch).
      required: false
    - name: latest
      description: End of the time range for the query (e.g., "now", Unix epoch).
      required: false
    - name: num_buckets
      description: Number of time buckets to divide the query range into.
      required: false
    outputs:
    - contextPath: CriblAPI.Metrics
      description: Aggregated metric results returned by the query.
      type: Unknown

  runonce: false
  script: |-
    import json
    import time

    import demistomock as demisto  # noqa: F401
    from CommonServerPython import *  # noqa: F401
    from CommonServerUserPython import *  # noqa: F401

    VENDOR_NAME = 'CriblAPI'
    CRIBL_CLOUD_TOKEN_URL = 'https://login.cribl.cloud/oauth/token'
    CRIBL_CLOUD_AUDIENCE = 'https://api.cribl.cloud'


    """ HELPERS """


    def is_token_expired(expiry_timestamp: int, buffer_seconds: int = 60) -> bool:
        return int(time.time()) >= (expiry_timestamp - buffer_seconds)


    def create_expiry_timestamp(expires_in: int) -> int:
        return int(time.time()) + expires_in


    def scoped_suffix(suffix: str, worker_group: str | None = None, worker_node: str | None = None) -> str:
        """Prepend w/{worker_node} or m/{worker_group} routing prefix when a scope is specified."""
        if worker_node:
            return f'w/{worker_node}/{suffix.lstrip("/")}'
        if worker_group:
            return f'm/{worker_group}/{suffix.lstrip("/")}'
        return suffix


    """ CLIENT """


    class Client(BaseClient):
