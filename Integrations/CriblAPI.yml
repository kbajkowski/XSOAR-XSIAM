            body = {
                'grant_type': 'client_credentials',
                'client_id': client_id,
                'client_secret': client_secret,
                'audience': CRIBL_CLOUD_AUDIENCE,
            }
            return self._http_request('POST', full_url=token_url, json_data=body)

