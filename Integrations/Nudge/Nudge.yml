category: Authentication & Identity Management
commonfields:
  id: Nudge
  version: -1
name: Nudge
display: Nudge Security
description: Discover, search, and manage your SaaS attack surface with Nudge Security - apps, accounts, OAuth grants, users, security findings, AI usage, browser extensions, and employee offboarding.
configuration:
- defaultvalue: https://api.nudgesecurity.io
  display: Server URL
  name: url
  required: true
  type: 0
  additionalinfo: The base URL of the Nudge Security API.
- displaypassword: API Token
  hiddenusername: true
  name: credentials
  required: true
  type: 9
  additionalinfo: The Nudge Security API token, sent as a Bearer token.
- display: Trust any certificate (not secure)
  name: insecure
  required: false
  type: 8
- display: Use system proxy settings
  name: proxy
  required: false
  type: 8
script:
  commands:
  - name: nudge-app-search
    description: Searches for SaaS apps discovered by Nudge Security.
    arguments:
    - name: filters
      description: 'JSON list of filter conditions combined with AND. Each condition is an object with "property", "op", and optional "value" keys, for example [{"property": "name", "op": "ilike", "value": "%slack%"}]. Supported operators: =, !=, <, <=, >, >=, like, ilike, not_like, not_ilike, in, notin, notnull, isnull. Supported properties: id, name, domain_canonical, account_count, adoption_percentage, first_date, fields, service_info.name, technical_contact_id, technical_contact.name, category, is_ignored.'
    - name: search
      description: JSON list of search conditions combined with OR. Uses the same format and properties as the filters argument.
    - name: page
      description: Page number to retrieve. Default is 1.
    - name: per_page
      description: Number of results per page. Maximum is 100.
      defaultValue: '50'
    - name: sort_by
      description: Property to sort the results by.
      auto: PREDEFINED
      predefined:
      - id
      - name
      - domain_canonical
      - account_count
      - adoption_percentage
      - first_date
    - name: sort_direction
      description: Sort direction. Default is asc.
      auto: PREDEFINED
      predefined:
      - asc
      - desc
    outputs:
    - contextPath: Nudge.App.id
      description: Unique ID of the app.
      type: Number
    - contextPath: Nudge.App.name
      description: Name of the app.
      type: String
    - contextPath: Nudge.App.domain_canonical
      description: Canonical domain of the app.
      type: String
    - contextPath: Nudge.App.category
      description: Category of the app.
      type: String
    - contextPath: Nudge.App.account_count
      description: Number of accounts discovered for the app.
      type: Number
    - contextPath: Nudge.App.adoption_percentage
      description: Percentage of accounts active in the last 90 days.
      type: Number
    - contextPath: Nudge.App.first_date
      description: Date the app was first discovered.
      type: Date
    - contextPath: Nudge.App.is_ignored
      description: Whether the app is marked as ignored in Nudge Security.
      type: Boolean
    - contextPath: Nudge.App.technical_contact_id
      description: User ID of the app's technical contact.
      type: Number
    - contextPath: Nudge.App.counters.total_accounts
      description: Total number of accounts for the app.
      type: Number
    - contextPath: Nudge.App.service_info
      description: Vendor service information (name, description, category, status page).
      type: Unknown
    - contextPath: Nudge.App.fields
      description: Custom fields set on the app.
      type: Unknown
    - contextPath: Nudge.App.labels
      description: Labels set on the app.
      type: Unknown
  - name: nudge-app-supply-chain-search
    description: Searches for apps in your SaaS supply chain by service category.
    arguments:
    - name: category
      description: Service category to filter the supply chain by.
      required: true
      auto: PREDEFINED
      predefined:
      - Finance
      - HR
      - Marketing
      - Sales
      - Analytics
      - Security
      - Project Management
      - Developer Tools
      - IT & Infrastructure
      - Communications
      - Customer Management
      - Collaboration
      - Misc
      - Design
      - Dev Ops
      - Productivity
      - Social Media
      - Legal
      - File Sharing
      - Public VPN
      - Shopping
      - Personal Finance
      - Healthcare
      - Dating
      - Streaming
      - Lifestyle
      - Gaming
      - Travel
      - Education
      - Government
      - AI Tools
      - Uncategorized
    - name: filters
      description: 'JSON list of filter conditions combined with AND. Each condition is an object with "property", "op", and optional "value" keys, for example [{"property": "name", "op": "ilike", "value": "%slack%"}]. Supported operators: =, !=, <, <=, >, >=, like, ilike, not_like, not_ilike, in, notin, notnull, isnull. Supported properties: id, name, domain_canonical, account_count, adoption_percentage, first_date, fields, service_info.name, technical_contact_id, technical_contact.name, category, is_ignored.'
    - name: search
      description: JSON list of search conditions combined with OR. Uses the same format and properties as the filters argument.
    - name: page
      description: Page number to retrieve. Default is 1.
    - name: per_page
      description: Number of results per page. Maximum is 100.
      defaultValue: '50'
    - name: sort_by
      description: Property to sort the results by.
      auto: PREDEFINED
      predefined:
      - id
      - name
      - domain_canonical
      - account_count
      - adoption_percentage
      - first_date
    - name: sort_direction
      description: Sort direction. Default is asc.
      auto: PREDEFINED
      predefined:
      - asc
      - desc
    outputs:
    - contextPath: Nudge.App.id
      description: Unique ID of the app.
      type: Number
    - contextPath: Nudge.App.name
      description: Name of the app.
      type: String
    - contextPath: Nudge.App.domain_canonical
      description: Canonical domain of the app.
      type: String
    - contextPath: Nudge.App.category
      description: Category of the app.
      type: String
    - contextPath: Nudge.App.account_count
      description: Number of accounts discovered for the app.
      type: Number
    - contextPath: Nudge.App.adoption_percentage
      description: Percentage of accounts active in the last 90 days.
      type: Number
    - contextPath: Nudge.App.first_date
      description: Date the app was first discovered.
      type: Date
    - contextPath: Nudge.App.is_ignored
      description: Whether the app is marked as ignored in Nudge Security.
      type: Boolean
    - contextPath: Nudge.App.service_info
      description: Vendor service information (name, description, category, status page).
      type: Unknown
  - name: nudge-app-get
    description: Retrieves a single SaaS app by its ID.
    arguments:
    - name: app_id
      description: The unique ID of the app to retrieve.
      required: true
    outputs:
    - contextPath: Nudge.App.id
      description: Unique ID of the app.
      type: Number
    - contextPath: Nudge.App.name
      description: Name of the app.
      type: String
    - contextPath: Nudge.App.domain_canonical
      description: Canonical domain of the app.
      type: String
    - contextPath: Nudge.App.category
      description: Category of the app.
      type: String
    - contextPath: Nudge.App.account_count
      description: Number of accounts discovered for the app.
      type: Number
    - contextPath: Nudge.App.adoption_percentage
      description: Percentage of accounts active in the last 90 days.
      type: Number
    - contextPath: Nudge.App.first_date
      description: Date the app was first discovered.
      type: Date
    - contextPath: Nudge.App.is_ignored
      description: Whether the app is marked as ignored in Nudge Security.
      type: Boolean
    - contextPath: Nudge.App.technical_contact_id
      description: User ID of the app's technical contact.
      type: Number
    - contextPath: Nudge.App.counters.total_accounts
      description: Total number of accounts for the app.
      type: Number
    - contextPath: Nudge.App.service_info
      description: Vendor service information (name, description, category, status page).
      type: Unknown
    - contextPath: Nudge.App.fields
      description: Custom fields set on the app.
      type: Unknown
    - contextPath: Nudge.App.labels
      description: Labels set on the app.
      type: Unknown
  - name: nudge-app-category-set
    description: Sets the category of an app.
    arguments:
    - name: app_id
      description: The unique ID of the app.
      required: true
    - name: category
      description: The category to assign to the app.
      required: true
      auto: PREDEFINED
      predefined:
      - Finance
      - HR
      - Marketing
      - Sales
      - Analytics
      - Security
      - Project Management
      - Developer Tools
      - IT & Infrastructure
      - Communications
      - Customer Management
      - Collaboration
      - Misc
      - Design
      - Dev Ops
      - Productivity
      - Social Media
      - Legal
      - File Sharing
      - Public VPN
      - Shopping
      - Personal Finance
      - Healthcare
      - Dating
      - Streaming
      - Lifestyle
      - Gaming
      - Travel
      - Education
      - Government
      - AI Tools
      - Uncategorized
  - name: nudge-app-field-set
    description: Sets the value of a custom field on an app.
    arguments:
    - name: app_id
      description: The unique ID of the app.
      required: true
    - name: field_id
      description: The unique ID of the custom field.
      required: true
    - name: value
      description: The value to set. For SELECT and MULTI_SELECT fields, the value must be one of the field's allowed values.
      required: true
    outputs:
    - contextPath: Nudge.AppField.id
      description: Unique ID of the field.
      type: Number
    - contextPath: Nudge.AppField.name
      description: Name of the field.
      type: String
    - contextPath: Nudge.AppField.value
      description: Value set on the app.
      type: Unknown
  - name: nudge-app-field-delete
    description: Deletes a custom field value from an app.
    arguments:
    - name: app_id
      description: The unique ID of the app.
      required: true
    - name: field_id
      description: The unique ID of the custom field.
      required: true
    - name: value
      description: For MULTI_SELECT fields, the specific value to remove. If omitted, the field is cleared.
  - name: nudge-app-label-add
    description: Adds a label to an app.
    arguments:
    - name: app_id
      description: The unique ID of the app.
      required: true
    - name: value
      description: The label value to add. The label must already exist (see nudge-label-create).
      required: true
  - name: nudge-app-label-delete
    description: Deletes a label from an app.
    arguments:
    - name: app_id
      description: The unique ID of the app.
      required: true
    - name: value
      description: The label value to delete from the app.
      required: true
  - name: nudge-app-instance-search
    description: Searches for instances (tenants/workspaces) of a specific app.
    arguments:
    - name: app_id
      description: The unique ID of the app whose instances to search.
      required: true
    - name: filters
      description: 'JSON list of filter conditions combined with AND. Each condition is an object with "property", "op", and optional "value" keys. Supported operators: =, !=, <, <=, >, >=, like, ilike, not_like, not_ilike, in, notin, notnull, isnull.'
    - name: search
      description: JSON list of search conditions combined with OR. Uses the same format as the filters argument.
    - name: page
      description: Page number to retrieve. Default is 1.
    - name: per_page
      description: Number of results per page. Maximum is 100.
      defaultValue: '50'
    - name: sort_by
      description: Property to sort the results by.
      auto: PREDEFINED
      predefined:
      - id
      - name
      - domain_canonical
      - first_date
    - name: sort_direction
      description: Sort direction. Default is asc.
      auto: PREDEFINED
      predefined:
      - asc
      - desc
    outputs:
    - contextPath: Nudge.AppInstance.id
      description: Unique ID of the app instance.
      type: Number
    - contextPath: Nudge.AppInstance.name
      description: Name of the app instance.
      type: String
    - contextPath: Nudge.AppInstance.display_name
      description: Display name of the app instance.
      type: String
    - contextPath: Nudge.AppInstance.domain_canonical
      description: Canonical domain of the app instance.
      type: String
    - contextPath: Nudge.AppInstance.identifier
      description: Identifier of the app instance.
      type: String
    - contextPath: Nudge.AppInstance.external_id
      description: External ID of the app instance.
      type: String
    - contextPath: Nudge.AppInstance.connection_status
      description: Connection status of the app instance.
      type: String
    - contextPath: Nudge.AppInstance.sso_label
      description: SSO label of the app instance.
      type: String
    - contextPath: Nudge.AppInstance.first_date
      description: Date the app instance was first discovered.
      type: Date
    - contextPath: Nudge.AppInstance.saas_id
      description: ID of the app the instance belongs to.
      type: Number
    - contextPath: Nudge.AppInstance.technical_contact_id
      description: User ID of the instance's technical contact.
      type: Number
  - name: nudge-app-technical-contact-set
    description: Sets a user as the technical contact of an app.
    arguments:
    - name: app_id
      description: The unique ID of the app.
      required: true
    - name: user_id
      description: The unique ID of the user to set as technical contact.
      required: true
  - name: nudge-app-technical-contact-delete
    description: Removes the technical contact of an app.
    arguments:
    - name: app_id
      description: The unique ID of the app.
      required: true
  - name: nudge-account-search
    description: Searches for SaaS accounts discovered by Nudge Security.
    arguments:
    - name: filters
      description: 'JSON list of filter conditions combined with AND. Each condition is an object with "property", "op", and optional "value" keys, for example [{"property": "mfa_status", "op": "=", "value": "disabled"}]. Supported operators: =, !=, <, <=, >, >=, like, ilike, not_like, not_ilike, in, notin, notnull, isnull. Supported properties: id, first_date, last_date, name, user_id, domain_canonical, mfa_status, fields, metadata.user_email, app_id, app.is_ignored.'
    - name: search
      description: JSON list of search conditions combined with OR. Uses the same format and properties as the filters argument.
    - name: page
      description: Page number to retrieve. Default is 1.
    - name: per_page
      description: Number of results per page. Maximum is 100.
      defaultValue: '50'
    - name: sort_by
      description: Property to sort the results by.
      auto: PREDEFINED
      predefined:
      - id
      - first_date
      - last_date
    - name: sort_direction
      description: Sort direction. Default is asc.
      auto: PREDEFINED
      predefined:
      - asc
      - desc
    outputs:
    - contextPath: Nudge.Account.id
      description: Unique ID of the account.
      type: Number
    - contextPath: Nudge.Account.name
      description: Name of the account (usually the account email or username).
      type: String
    - contextPath: Nudge.Account.domain_canonical
      description: Canonical domain of the app the account belongs to.
      type: String
    - contextPath: Nudge.Account.app_id
      description: ID of the app the account belongs to.
      type: Number
    - contextPath: Nudge.Account.user_id
      description: ID of the user who owns the account.
      type: Number
    - contextPath: Nudge.Account.mfa_status
      description: MFA status of the account.
      type: String
    - contextPath: Nudge.Account.is_admin
      description: Whether the account has admin privileges.
      type: Boolean
    - contextPath: Nudge.Account.first_account
      description: Whether this was the first account discovered for the app.
      type: Boolean
    - contextPath: Nudge.Account.first_date
      description: Date the account was first discovered.
      type: Date
    - contextPath: Nudge.Account.last_date
      description: Date of the most recent account activity.
      type: Date
    - contextPath: Nudge.Account.last_billing_date
      description: Date of the last billing event for the account.
      type: Date
    - contextPath: Nudge.Account.last_password_reset
      description: Date of the last password reset for the account.
      type: Date
    - contextPath: Nudge.Account.discovery_info
      description: How the account was discovered.
      type: String
    - contextPath: Nudge.Account.metadata.user_email
      description: Email of the user who owns the account.
      type: String
    - contextPath: Nudge.Account.auth_methods
      description: Authentication methods observed for the account.
      type: Unknown
    - contextPath: Nudge.Account.fields
      description: Custom fields set on the account.
      type: Unknown
    - contextPath: Nudge.Account.labels
      description: Labels set on the account.
      type: Unknown
  - name: nudge-account-get
    description: Retrieves a single SaaS account by its ID.
    arguments:
    - name: account_id
      description: The unique ID of the account to retrieve.
      required: true
    outputs:
    - contextPath: Nudge.Account.id
      description: Unique ID of the account.
      type: Number
    - contextPath: Nudge.Account.name
      description: Name of the account (usually the account email or username).
      type: String
    - contextPath: Nudge.Account.domain_canonical
      description: Canonical domain of the app the account belongs to.
      type: String
    - contextPath: Nudge.Account.app_id
      description: ID of the app the account belongs to.
      type: Number
    - contextPath: Nudge.Account.user_id
      description: ID of the user who owns the account.
      type: Number
    - contextPath: Nudge.Account.mfa_status
      description: MFA status of the account.
      type: String
    - contextPath: Nudge.Account.is_admin
      description: Whether the account has admin privileges.
      type: Boolean
    - contextPath: Nudge.Account.first_date
      description: Date the account was first discovered.
      type: Date
    - contextPath: Nudge.Account.last_date
      description: Date of the most recent account activity.
      type: Date
    - contextPath: Nudge.Account.metadata.user_email
      description: Email of the user who owns the account.
      type: String
    - contextPath: Nudge.Account.auth_methods
      description: Authentication methods observed for the account.
      type: Unknown
    - contextPath: Nudge.Account.fields
      description: Custom fields set on the account.
      type: Unknown
    - contextPath: Nudge.Account.labels
      description: Labels set on the account.
      type: Unknown
  - name: nudge-account-field-set
    description: Sets the value of a custom field on an account.
    arguments:
    - name: account_id
      description: The unique ID of the account.
      required: true
    - name: field_id
      description: The unique ID of the custom field.
      required: true
    - name: value
      description: The value to set. For SELECT and MULTI_SELECT fields, the value must be one of the field's allowed values.
      required: true
    outputs:
    - contextPath: Nudge.AccountField.id
      description: Unique ID of the field.
      type: Number
    - contextPath: Nudge.AccountField.name
      description: Name of the field.
      type: String
    - contextPath: Nudge.AccountField.value
      description: Value set on the account.
      type: Unknown
  - name: nudge-account-field-delete
    description: Deletes a custom field value from an account.
    arguments:
    - name: account_id
      description: The unique ID of the account.
      required: true
    - name: field_id
      description: The unique ID of the custom field.
      required: true
    - name: value
      description: For MULTI_SELECT fields, the specific value to remove. If omitted, the field is cleared.
  - name: nudge-account-label-add
    description: Adds a label to an account.
    arguments:
    - name: account_id
      description: The unique ID of the account.
      required: true
    - name: value
      description: The label value to add. The label must already exist (see nudge-label-create).
      required: true
  - name: nudge-account-label-delete
    description: Deletes a label from an account.
    arguments:
    - name: account_id
      description: The unique ID of the account.
      required: true
    - name: value
      description: The label value to delete from the account.
      required: true
  - name: nudge-oauth-grant-search
    description: Searches for OAuth grants discovered by Nudge Security.
    arguments:
    - name: filters
      description: 'JSON list of filter conditions combined with AND. Each condition is an object with "property", "op", and optional "value" keys, for example [{"property": "risk_level", "op": "=", "value": "high"}]. Supported operators: =, !=, <, <=, >, >=, like, ilike, not_like, not_ilike, in, notin, notnull, isnull. Supported properties: id, first_seen, last_seen, risk_score, name, oauth_integration, risk_level, user_id, fields, access_type, parent_account_id, account_id, app.is_ignored, account_category, permissions, user_account_status, user_is_admin, org_unit_name.'
    - name: search
      description: JSON list of search conditions combined with OR. Uses the same format and properties as the filters argument.
    - name: page
      description: Page number to retrieve. Default is 1.
    - name: per_page
      description: Number of results per page. Maximum is 100.
      defaultValue: '50'
    - name: sort_by
      description: Property to sort the results by.
      auto: PREDEFINED
      predefined:
      - id
      - first_seen
      - last_seen
      - risk_score
    - name: sort_direction
      description: Sort direction. Default is asc.
      auto: PREDEFINED
      predefined:
      - asc
      - desc
    outputs:
    - contextPath: Nudge.OAuthGrant.id
      description: Unique ID of the OAuth grant.
      type: Number
    - contextPath: Nudge.OAuthGrant.name
      description: Name of the application the grant was issued to.
      type: String
    - contextPath: Nudge.OAuthGrant.risk_level
      description: Risk level of the OAuth grant.
      type: String
    - contextPath: Nudge.OAuthGrant.risk_score
      description: Risk score of the OAuth grant.
      type: Number
    - contextPath: Nudge.OAuthGrant.user_id
      description: ID of the user who issued the grant.
      type: Number
    - contextPath: Nudge.OAuthGrant.account_id
      description: ID of the account associated with the grant.
      type: Number
    - contextPath: Nudge.OAuthGrant.parent_account_id
      description: ID of the parent account that authorized the grant.
      type: Number
    - contextPath: Nudge.OAuthGrant.app_external_id
      description: External ID of the application the grant was issued to.
      type: String
    - contextPath: Nudge.OAuthGrant.oauth_integration
      description: Whether the grant is an app-to-app integration.
      type: Boolean
    - contextPath: Nudge.OAuthGrant.first_seen
      description: Date the grant was first seen.
      type: Date
    - contextPath: Nudge.OAuthGrant.last_seen
      description: Date the grant was last seen.
      type: Date
    - contextPath: Nudge.OAuthGrant.scopes
      description: OAuth scopes included in the grant.
      type: Unknown
    - contextPath: Nudge.OAuthGrant.insights
      description: Risk insights for the grant.
      type: Unknown
    - contextPath: Nudge.OAuthGrant.oauth_info
      description: Additional OAuth information for the grant.
      type: Unknown
    - contextPath: Nudge.OAuthGrant.fields
      description: Custom fields set on the grant.
      type: Unknown
    - contextPath: Nudge.OAuthGrant.labels
      description: Labels set on the grant.
      type: Unknown
  - name: nudge-oauth-grant-get
    description: Retrieves a single OAuth grant by its ID.
    arguments:
    - name: oauth_id
      description: The unique ID of the OAuth grant to retrieve.
      required: true
    outputs:
    - contextPath: Nudge.OAuthGrant.id
      description: Unique ID of the OAuth grant.
      type: Number
    - contextPath: Nudge.OAuthGrant.name
      description: Name of the application the grant was issued to.
      type: String
    - contextPath: Nudge.OAuthGrant.risk_level
      description: Risk level of the OAuth grant.
      type: String
    - contextPath: Nudge.OAuthGrant.risk_score
      description: Risk score of the OAuth grant.
      type: Number
    - contextPath: Nudge.OAuthGrant.user_id
      description: ID of the user who issued the grant.
      type: Number
    - contextPath: Nudge.OAuthGrant.account_id
      description: ID of the account associated with the grant.
      type: Number
    - contextPath: Nudge.OAuthGrant.oauth_integration
      description: Whether the grant is an app-to-app integration.
      type: Boolean
    - contextPath: Nudge.OAuthGrant.first_seen
      description: Date the grant was first seen.
      type: Date
    - contextPath: Nudge.OAuthGrant.last_seen
      description: Date the grant was last seen.
      type: Date
    - contextPath: Nudge.OAuthGrant.scopes
      description: OAuth scopes included in the grant.
      type: Unknown
    - contextPath: Nudge.OAuthGrant.insights
      description: Risk insights for the grant.
      type: Unknown
  - name: nudge-event-search
    description: Searches for discovery and activity events recorded by Nudge Security.
    arguments:
    - name: filters
      description: 'JSON list of filter conditions combined with AND. Each condition is an object with "property", "op", and optional "value" keys, for example [{"property": "type", "op": "=", "value": "new_app"}]. Supported operators: =, !=, <, <=, >, >=, like, ilike, not_like, not_ilike, in, notin, notnull, isnull. Supported properties: id, date, type, user_id, from_email, user_email, domain_canonical, account_id.'
    - name: search
      description: JSON list of search conditions combined with OR. Uses the same format and properties as the filters argument.
    - name: start_date
      description: Only return events on or after this date. Accepts ISO 8601 or relative dates such as "7 days ago".
    - name: end_date
      description: Only return events on or before this date. Accepts ISO 8601 or relative dates such as "1 day ago".
    - name: page
      description: Page number to retrieve. Default is 1.
    - name: per_page
      description: Number of results per page. Maximum is 100.
      defaultValue: '50'
    - name: sort_by
      description: Property to sort the results by.
      auto: PREDEFINED
      predefined:
      - id
      - date
      - type
    - name: sort_direction
